<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">Risk based testing map</title>
  <desc id="desc">A product risk map that groups features by user impact and change frequency.</desc>
  <rect width="1200" height="720" fill="#f6f8f7"/>
  <rect x="120" y="86" width="960" height="548" rx="24" fill="#ffffff" stroke="#d4ddd9" stroke-width="3"/>
  <line x1="220" y1="548" x2="980" y2="548" stroke="#102a2a" stroke-width="4"/>
  <line x1="220" y1="548" x2="220" y2="160" stroke="#102a2a" stroke-width="4"/>
  <text x="512" y="604" fill="#102a2a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700">Change Frequency</text>
  <text x="82" y="390" fill="#102a2a" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="700" transform="rotate(-90 82 390)">User Impact</text>
  <g font-family="Inter, Arial, sans-serif" font-weight="700">
    <rect x="278" y="392" width="184" height="90" rx="16" fill="#d9f1ee"/>
    <text x="312" y="445" fill="#0f3f3a" font-size="24">Profile</text>
    <rect x="518" y="320" width="184" height="90" rx="16" fill="#fff4d7"/>
    <text x="552" y="373" fill="#5b3b00" font-size="24">Search</text>
    <rect x="760" y="208" width="184" height="90" rx="16" fill="#fee2e2"/>
    <text x="800" y="261" fill="#7f1d1d" font-size="24">Payment</text>
    <rect x="746" y="420" width="206" height="90" rx="16" fill="#eef2ff"/>
    <text x="784" y="473" fill="#27346f" font-size="24">Reports</text>
    <rect x="356" y="218" width="194" height="90" rx="16" fill="#dcfce7"/>
    <text x="389" y="271" fill="#14532d" font-size="24">Login</text>
  </g>
  <circle cx="944" cy="198" r="34" fill="#ef4444"/>
  <text x="934" y="208" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">!</text>
</svg>
